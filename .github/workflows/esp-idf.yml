name: build R2P2-ESP32

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # ESP32: FemtoRuby
          - target: esp32
            vm_flag: mrubyc
            sdkconfig_defaults: sdkconfig.defaults
          # ESP32-C3: FemtoRuby
          - target: esp32c3
            vm_flag: mrubyc
            sdkconfig_defaults: sdkconfig.defaults
          # ESP32-C6: PicoRuby
          - target: esp32c6
            vm_flag: mruby
            sdkconfig_defaults: sdkconfig.defaults
          - target: esp32c6
            vm_flag: mruby
            sdkconfig_defaults: "sdkconfig.defaults;sdkconfigs/usb_console"
          # ESP32-H2: FemtoRuby
          - target: esp32h2
            vm_flag: mrubyc
            sdkconfig_defaults: sdkconfig.defaults
          - target: esp32h2
            vm_flag: mrubyc
            sdkconfig_defaults: "sdkconfig.defaults;sdkconfigs/usb_console"
          # ESP32-P4: PicoRuby
          - target: esp32p4
            vm_flag: mruby
            sdkconfig_defaults: sdkconfig.defaults
          - target: esp32p4
            vm_flag: mruby
            sdkconfig_defaults: "sdkconfig.defaults;sdkconfigs/usb_console"
          # ESP32-S3: FemtoRuby and PicoRuby
          - target: esp32s3
            vm_flag: mrubyc
            sdkconfig_defaults: sdkconfig.defaults
          - target: esp32s3
            vm_flag: mruby
            sdkconfig_defaults: sdkconfig.defaults
          - target: esp32s3
            vm_flag: mrubyc
            sdkconfig_defaults: "sdkconfig.defaults;sdkconfigs/usb_console"
          - target: esp32s3
            vm_flag: mruby
            sdkconfig_defaults: "sdkconfig.defaults;sdkconfigs/usb_console"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
      - name: Bundle install
        run: bundle install
        working-directory: ./components/picoruby-esp32/picoruby
      - name: Rake
        run: rake
        working-directory: ./components/picoruby-esp32/picoruby
      - name: esp-idf build
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.5.1
          target: ${{ matrix.target }}
          path: '.'
          command: SDKCONFIG_DEFAULTS="${{ matrix.sdkconfig_defaults }}" idf.py build -DPICORB_VM=${{ matrix.vm_flag }}
